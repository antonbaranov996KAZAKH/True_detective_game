<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка - Управление игрой</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
  color: #333;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  background: white;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  padding: 25px;
  margin-bottom: 25px;
}

.card h2 {
  color: #667eea;
  margin-bottom: 20px;
  font-size: 24px;
  border-bottom: 2px solid #667eea;
  padding-bottom: 10px;
  display: inline-block;
}

.timer-panel {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 25px;
}

.timer-controls {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  align-items: flex-end;
  margin-top: 20px;
}

.time-input-group {
  background: rgba(255,255,255,0.2);
  padding: 15px;
  border-radius: 10px;
}

.time-input-group label {
  display: block;
  font-size: 12px;
  margin-bottom: 5px;
}

.time-input-group input {
  padding: 10px;
  font-size: 20px;
  width: 100px;
  border: none;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  background: white;
  color: #667eea;
}

.btn {
  padding: 12px 25px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  color: white;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn-start { background: #4CAF50; }
.btn-stop { background: #f44336; }
.btn-reset { background: #ff9800; }

.timer-status {
  font-size: 32px;
  font-weight: bold;
  margin: 20px 0;
  text-align: center;
  font-family: monospace;
}

.timer-status.active { color: #4CAF50; }
.timer-status.inactive { color: #f44336; }

.status-badge {
  display: inline-block;
  padding: 5px 15px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
}

.status-active { background: #4CAF50; color: white; }
.status-inactive { background: #f44336; color: white; }

.history-list {
  max-height: 500px;
  overflow-y: auto;
}

.history-item {
  background: #f8f9fa;
  border-left: 4px solid #667eea;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.history-team { font-weight: bold; color: #667eea; }
.history-address { color: #666; margin-top: 5px; }
.history-time { font-size: 12px; color: #999; margin-top: 5px; }
</style>
</head>
<body>
<div class="container">
  <div class="timer-panel">
    <h2 style="color: white;">⏱ Управление игровым временем</h2>
    
    <div class="timer-controls">
      <div class="time-input-group">
        <label>Минуты</label>
        <input type="number" id="minutes" min="0" max="60" value="5">
      </div>
      <div class="time-input-group">
        <label>Секунды</label>
        <input type="number" id="seconds" min="0" max="59" value="0">
      </div>
      <button class="btn btn-start" onclick="startTimer()">▶ Старт</button>
      <button class="btn btn-stop" onclick="stopTimer()">⏹ Стоп</button>
      <button class="btn btn-reset" onclick="resetTimer()">🔄 Сброс</button>
    </div>
    
    <div class="timer-status" id="timerStatus">⏳ Таймер неактивен</div>
  </div>

  <div class="card">
    <h2>🎮 Статус игры</h2>
    <div style="margin-top: 20px;">
      <span class="status-badge" id="gameStatus">Загрузка...</span>
    </div>
  </div>

  <div class="card">
    <h2>📊 История всех поездок</h2>
    <div id="history" class="history-list">Загрузка...</div>
  </div>
</div>

<script>
function startTimer() {
  const minutes = parseInt(document.getElementById('minutes').value) || 0;
  const seconds = parseInt(document.getElementById('seconds').value) || 0;
  
  fetch('/api/timer/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ minutes, seconds })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert('✅ Таймер запущен!');
      loadStatus();
    }
  });
}

function stopTimer() {
  fetch('/api/timer/stop', { method: 'POST' })
    .then(() => {
      alert('⏸ Таймер остановлен');
      loadStatus();
    });
}

function resetTimer() {
  fetch('/api/timer/reset', { method: 'POST' })
    .then(() => {
      alert('🔄 Таймер сброшен');
      loadStatus();
    });
}

function loadStatus() {
  fetch('/api/timer/status')
    .then(res => res.json())
    .then(data => {
      const statusEl = document.getElementById('timerStatus');
      const gameStatusEl = document.getElementById('gameStatus');
      
      if (data.active && data.timeLeft > 0) {
        const minutes = Math.floor(data.timeLeft / 60);
        const seconds = data.timeLeft % 60;
        statusEl.innerHTML = `⏱ Активен: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        statusEl.className = 'timer-status active';
        gameStatusEl.innerHTML = '<span class="status-badge status-active">🟢 Игра активна</span>';
      } else {
        statusEl.innerHTML = '⏸ Таймер неактивен';
        statusEl.className = 'timer-status inactive';
        gameStatusEl.innerHTML = '<span class="status-badge status-inactive">🔴 Игра остановлена</span>';
      }
    });
}

function loadHistory() {
  fetch('/api/admin/history')
    .then(res => res.json())
    .then(data => {
      const historyDiv = document.getElementById('history');
      if (!data.allTrips || data.allTrips.length === 0) {
        historyDiv.innerHTML = '<p style="text-align:center; color:#999;">Пока нет поездок</p>';
        return;
      }
      
      let html = '';
      data.allTrips.slice().reverse().forEach(trip => {
        html += `
          <div class="history-item">
            <div class="history-team">🏢 ${trip.team}</div>
            <div class="history-address">📍 ${trip.address}</div>
            <div class="history-time">🕒 ${trip.time}</div>
          </div>
        `;
      });
      historyDiv.innerHTML = html;
    });
}

setInterval(() => {
  loadStatus();
  loadHistory();
}, 1000);

loadStatus();
loadHistory();
</script>
</body>
</html>
