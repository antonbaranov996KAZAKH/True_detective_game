<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h1>Панель мастера</h1>

<table border="1">
<thead>
<tr><th>Email</th><th>Поездки</th><th>История</th></tr>
</thead>
<tbody id="players"></tbody>
</table>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDp_pIoFFvfHLp36eToVhD8lLmV5HT_czs",
  authDomain: "detective-game-52acd.firebaseapp.com",
  projectId: "detective-game-52acd",
  storageBucket: "detective-game-52acd.firebasestorage.app",
  messagingSenderId: "1074567510590",
  appId: "1:1074567510590:web:f1a0e5960199b28cf62f6f",
  measurementId: "G-3S323YJQ0D"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const table = document.getElementById("players");

db.collection("players").onSnapshot((snapshot) => {
  table.innerHTML = "";
  snapshot.forEach((doc) => {
    const data = doc.data();
    const row = `<tr>
      <td>${data.email}</td>
      <td>${data.rides}</td>
      <td>${data.history.join(", ")}</td>
    </tr>`;
    table.innerHTML += row;
  });
});
</script>

</body>
</html>
