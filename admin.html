<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h1>Панель мастера</h1>
<button id="startBtn">Старт таймера</button>
<button id="pauseBtn">Пауза</button>
<p>Таймер: <span id="timer">0</span></p>

<h3>Игроки</h3>
<table border="1">
<thead><tr><th>Email</th><th>Поездки</th><th>История</th></tr></thead>
<tbody id="players"></tbody>
</table>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDp_pIoFFvfHLp36eToVhD8lLmV5HT_czs",
  authDomain: "detective-game-52acd.firebaseapp.com",
  projectId: "detective-game-52acd",
  storageBucket: "detective-game-52acd.firebasestorage.app",
  messagingSenderId: "1074567510590",
  appId: "1:1074567510590:web:f1a0e5960199b28cf62f6f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let gameRunning = false;

// Подписка на прогресс
db.collection("game").doc("current").onSnapshot(doc => {
  const data = doc.data();
  if (!data) return;

  document.getElementById("timer").innerText = data.timer || 0;

  const tbody = document.getElementById("players");
  tbody.innerHTML = "";
  const ridesObj = data.rides || {};
  const histObj = data.history || {};

  Object.keys(ridesObj).forEach(uid => {
    const email = uid; // для простоты, email можно хранить в players
    const row = `<tr>
      <td>${email}</td>
      <td>${ridesObj[uid]}</td>
      <td>${(histObj[uid] || []).join(", ")}</td>
    </tr>`;
    tbody.innerHTML += row;
  });
});

// Таймер админа
let timerInterval;
document.getElementById("startBtn").addEventListener("click", () => {
  if (timerInterval) return;
  timerInterval = setInterval(async () => {
    const gameRef = db.collection("game").doc("current");
    const docSnap = await gameRef.get();
    let t = docSnap.data()?.timer || 0;
    t++;
    await gameRef.update({ timer: t });
  }, 1000);
});

document.getElementById("pauseBtn").addEventListener("click", () => {
  clearInterval(timerInterval);
  timerInterval = null;
});
</script>

</body>
</html>
