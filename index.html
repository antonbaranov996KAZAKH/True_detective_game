<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка - Детективная игра</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      color: #fff;
    }
    
    #admin-login {
      max-width: 400px;
      margin: 100px auto;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }
    
    #admin-panel {
      max-width: 1200px;
      margin: 20px auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }
    
    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }
    
    button {
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #45a049;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      margin: 20px 0;
    }
    
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    th {
      background: rgba(0,0,0,0.3);
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    
    .stat-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 5px;
    }
    
    .danger-btn {
      background: #f44336;
    }
    
    .danger-btn:hover {
      background: #d32f2f;
    }
  </style>
</head>
<body>

<div id="admin-login">
  <h2>🔐 Панель администратора</h2>
  <input type="password" id="adminPass" placeholder="Введите пароль">
  <button onclick="adminLogin()">Войти</button>
</div>

<div id="admin-panel" style="display:none;">
  <h2>📊 Статистика игры</h2>
  
  <div class="stats">
    <div class="stat-card">
      <h3>👥 Команд</h3>
      <p id="statsTeams" style="font-size: 24px;">0</p>
    </div>
    <div class="stat-card">
      <h3>🚗 Всего поездок</h3>
      <p id="statsTrips" style="font-size: 24px;">0</p>
    </div>
  </div>
  
  <h3>📋 История всех поездок</h3>
  <div style="overflow-x: auto;">
    <table>
      <thead>
        <tr>
          <th>Команда</th>
          <th>Время</th>
          <th>Адрес</th>
          <th>Информация</th>
        </tr>
      </thead>
      <tbody id="adminHistory"></tbody>
    </table>
  </div>
  
  <button onclick="resetAllData()" class="danger-btn">⚠️ СБРОСИТЬ ВСЕ ДАННЫЕ</button>
  <button onclick="adminLogout()">🚪 Выйти</button>
</div>

<script>
const ADMIN_PASSWORD = 'admin123';
let adminInterval = null;

function adminLogin() {
  const pass = document.getElementById('adminPass').value;
  if (pass !== ADMIN_PASSWORD) {
    alert('❌ Неверный пароль');
    return;
  }
  
  document.getElementById('admin-login').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  
  loadAdminData();
  adminInterval = setInterval(loadAdminData, 3000);
}

function adminLogout() {
  if (adminInterval) {
    clearInterval(adminInterval);
    adminInterval = null;
  }
  
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('admin-login').style.display = 'block';
  document.getElementById('adminPass').value = '';
}

function loadAdminData() {
  fetch('/api/admin/history')
    .then(res => res.json())
    .then(data => {
      updateAdminTable(data.allTrips);
      document.getElementById('statsTeams').textContent = data.totalTeams || 0;
      document.getElementById('statsTrips').textContent = data.allTrips?.length || 0;
    })
    .catch(err => console.error('Ошибка загрузки:', err));
}

function updateAdminTable(trips) {
  const tbody = document.getElementById('adminHistory');
  tbody.innerHTML = '';
  
  if (!trips || trips.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Пока нет поездок</td></tr>';
    return;
  }
  
  trips.slice(0, 100).forEach(trip => {
    const tr = document.createElement('tr');
    
    if (trip.info === 'По этому адресу ничего интересного не обнаружено') {
      tr.style.opacity = '0.7';
    }
    
    tr.innerHTML = `
      <td><strong>${trip.team}</strong></td>
      <td>${trip.time}</td>
      <td>${trip.address}</td>
      <td>${trip.info}</td>
    `;
    tbody.appendChild(tr);
  });
}

function resetAllData() {
  if (!confirm('⚠️ ВНИМАНИЕ! Вы уверены, что хотите удалить ВСЕ данные игры?')) return;
  if (!confirm('Последнее предупреждение! Это действие нельзя отменить.')) return;
  
  fetch('/api/admin/reset', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: ADMIN_PASSWORD})
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert('✅ Все данные сброшены');
      loadAdminData();
    } else {
      alert('❌ Ошибка при сбросе данных');
    }
  })
  .catch(() => alert('❌ Ошибка связи с сервером'));
}
</script>
</body>
</html>
