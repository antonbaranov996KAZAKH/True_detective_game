<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detective Game</title>
</head>

<body>

<h2>Вход в игру</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Войти</button>

<hr>

<div id="game" style="display:none">

<h2>Игра</h2>

<p>Таймер: <span id="timer">0</span></p>
<p>Поездки: <span id="rides">0</span></p>

<input id="address" placeholder="Введите адрес">

<button onclick="go()">Поехали</button>

<h3>История поездок</h3>
<ul id="history"></ul>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDp_pIoFFvfHLp36eToVhD8lLmV5HT_czs",
  authDomain: "detective-game-52acd.firebaseapp.com",
  projectId: "detective-game-52acd",
  storageBucket: "detective-game-52acd.firebasestorage.app",
  messagingSenderId: "1074567510590",
  appId: "1:1074567510590:web:f1a0e5960199b28cf62f6f",
  measurementId: "G-3S323YJQ0D"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId;
let rides = 0;
let seconds = 0;

window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(async (userCredential)=>{

userId = userCredential.user.uid;

document.getElementById("game").style.display="block";

await setDoc(doc(db,"players",userId),{
email:email,
rides:0,
history:[],
time:0
});

});

}

window.go = async function(){

const address = document.getElementById("address").value;

rides++;

document.getElementById("rides").innerText = rides;

const li = document.createElement("li");
li.innerText = address;

document.getElementById("history").appendChild(li);

await updateDoc(doc(db,"players",userId),{
rides:rides,
history:arrayUnion(address)
});

}

setInterval(()=>{

seconds++;

document.getElementById("timer").innerText = seconds;

},1000);

</script>

</body>
</html>
